name: Publish GHCR Main

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI Main Runtime
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Publish runtime images
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      GHCR_PACKAGES_TOKEN: ${{ secrets.GHCR_PACKAGES_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_suffix: frontend
            context: .
            dockerfile: Dockerfile
            smoke_http_port: 18080
            smoke_https_port: 18443
          - image_suffix: backend
            context: .
            dockerfile: backend/Dockerfile
            smoke_http_port: 18081
            smoke_https_port: 18444
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Build local runtime images for smoke
        run: |
          docker build -f Dockerfile -t local/woong-blog-frontend:publish .
          docker build -f backend/Dockerfile -t local/woong-blog-springboot-backend:publish .

      - name: Verify main-safe prod compose policy
        env:
          FRONTEND_IMAGE: local/woong-blog-frontend:publish
          BACKEND_IMAGE: local/woong-blog-springboot-backend:publish
          COMPOSE_PROJECT_NAME: woong-main-publish-${{ matrix.image_suffix }}
          NGINX_HTTP_PORT: ${{ matrix.smoke_http_port }}
          NGINX_HTTPS_PORT: ${{ matrix.smoke_https_port }}
          BASE_URL: http://localhost:${{ matrix.smoke_http_port }}
        run: bash ./scripts/ci-compose-smoke.sh main

      - name: Normalize image names
        id: vars
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          repo_name="${GITHUB_REPOSITORY#*/}"
          echo "repo_lc=${repo_name,,}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            sha="${{ github.event.workflow_run.head_sha }}"
          else
            sha="${GITHUB_SHA}"
          fi
          echo "sha_short=${sha::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_suffix }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.repo_lc }}-runtime-${{ matrix.image_suffix }}:main
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.repo_lc }}-runtime-${{ matrix.image_suffix }}:sha-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.repo_lc }}-runtime-${{ matrix.image_suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to GHCR for legacy aliases
        if: ${{ env.GHCR_PACKAGES_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ env.GHCR_PACKAGES_TOKEN }}

      - name: Build and push legacy aliases
        if: ${{ env.GHCR_PACKAGES_TOKEN != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.repo_lc }}-${{ matrix.image_suffix }}:main
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.repo_lc }}-${{ matrix.image_suffix }}:sha-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.repo_lc }}-${{ matrix.image_suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
