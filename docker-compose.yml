services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_ORIGIN: http://backend:8080
      ENABLE_LOCAL_ADMIN_SHORTCUT: ${ENABLE_LOCAL_ADMIN_SHORTCUT:-false}
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      CODEX_HOME: /root/.codex
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-portfolio}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-portfolio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${POSTGRES_MAX_POOL_SIZE:-40}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${POSTGRES_MIN_POOL_SIZE:-0}
      APP_DATA_PROTECTION_KEYS_PATH: /app/data-protection
      APP_AUTH_MEDIA_ROOT: /app/media
      APP_AUTH_ENABLE_TEST_LOGIN_ENDPOINT: ${APP_AUTH_ENABLE_TEST_LOGIN_ENDPOINT:-false}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-${CloudflareR2__AccountId:-}}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-${CloudflareR2__AccessKeyId:-}}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-${CloudflareR2__SecretAccessKey:-}}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-${CloudflareR2__BucketName:-}}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-${CloudflareR2__Endpoint:-}}
      CLOUDFLARE_R2_BROWSER_ENDPOINT: ${CLOUDFLARE_R2_BROWSER_ENDPOINT:-${CloudflareR2__BrowserEndpoint:-}}
      CLOUDFLARE_R2_PUBLIC_URL: ${CLOUDFLARE_R2_PUBLIC_URL:-${CloudflareR2__PublicUrl:-}}
      CLOUDFLARE_R2_FORCE_ENABLED_IN_DEVELOPMENT: ${CLOUDFLARE_R2_FORCE_ENABLED_IN_DEVELOPMENT:-${CloudflareR2__ForceEnabledInDevelopment:-false}}
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_HOST_PORT:-8080}:8080"
    expose:
      - "8080"
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - data-protection-keys:/app/data-protection
      - media-storage:/app/media
      - ${CODEX_HOME_DIR:-${HOME}/.codex}:/root/.codex

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - ${POSTGRES_DATA_DIR:-./.docker-data/local/postgres}:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_BIND_HOST:-127.0.0.1}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_BIND_HOST:-127.0.0.1}:${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_MAIN_CONF:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ${NGINX_DEFAULT_CONF:-./nginx/local-https.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./.local-certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  data-protection-keys:
  media-storage:
