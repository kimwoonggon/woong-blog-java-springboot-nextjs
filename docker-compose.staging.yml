services:
  frontend:
    image: ${FRONTEND_IMAGE}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_ORIGIN: http://backend:8080
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      ENABLE_LOCAL_ADMIN_SHORTCUT: "false"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}
    env_file:
      - ${APP_ENV_FILE:-.env.staging}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-staging}
      SERVER_PORT: 8080
      CODEX_HOME: /root/.codex
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${POSTGRES_MAX_POOL_SIZE:-40}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${POSTGRES_MIN_POOL_SIZE:-0}
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED:-false}
      APP_DATA_PROTECTION_KEYS_PATH: /app/data-protection
      APP_AUTH_MEDIA_ROOT: /app/media
      APP_AUTH_ENABLE_TEST_LOGIN_ENDPOINT: "false"
      APP_AUTH_SECURE_COOKIES: "true"
      APP_REQUIRE_HTTPS_METADATA: "true"
      PROXY_KNOWN_NETWORKS_0: ${PROXY_KNOWN_NETWORK:-172.16.0.0/12}
      SECURITY_USE_HTTPS_REDIRECTION: "true"
      SECURITY_USE_HSTS: "true"
      LOAD_TESTING_BASE_URL: ${LOAD_TESTING_BASE_URL:-${NEXT_PUBLIC_SITE_URL:-https://staging.example.com}}
    expose:
      - "8080"
    depends_on:
      - db
    volumes:
      - data-protection-keys:/app/data-protection
      - media-storage:/app/media
      - ${CODEX_HOME_DIR:-${HOME}/.codex}:/root/.codex
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_DIR:-./.docker-data/staging/postgres}:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_BIND_HOST:-127.0.0.1}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_BIND_HOST:-127.0.0.1}:${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_MAIN_CONF:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ${NGINX_DEFAULT_CONF:-./nginx/prod-bootstrap.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${CERTBOT_WWW_DIR:-./certbot/www}:/var/www/certbot
      - ${LETSENCRYPT_DIR:-./certbot/conf}:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  data-protection-keys:
  media-storage:
