resolver 127.0.0.11 ipv6=off valid=30s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name woonglab.com;
    client_max_body_size 250m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://woonglab.com$request_uri;
    }
}

server {
    listen 80;
    server_name www.woonglab.com;
    client_max_body_size 250m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://woonglab.com$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/current/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/current/privkey.pem;
    return 444;
}

server {
    listen 443 ssl;
    http2 on;
    server_name woonglab.com;
    set $frontend_upstream http://frontend:3000;
    set $backend_upstream http://backend:8080;
    set $client_ip $remote_addr;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://accounts.google.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; frame-src https://www.youtube-nocookie.com; connect-src 'self' https:; object-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" always;

    if ($http_cf_connecting_ip != "") {
        set $client_ip $http_cf_connecting_ip;
    }

    ssl_certificate /etc/letsencrypt/live/current/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/current/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 250m;

    location ~* ^/media/videos/.*\.mp4$ {
        return 404;
    }

    location /media/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location /api/admin/ai/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        add_header X-Nginx-Request-Time $request_time always;
        add_header X-Nginx-Upstream-Time $upstream_response_time always;
        add_header X-Nginx-Upstream-Response-Time $upstream_response_time always;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        add_header X-Nginx-Request-Time $request_time always;
        add_header X-Nginx-Upstream-Time $upstream_response_time always;
        add_header X-Nginx-Upstream-Response-Time $upstream_response_time always;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.woonglab.com;

    ssl_certificate /etc/letsencrypt/live/current/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/current/privkey.pem;
    return 301 https://woonglab.com$request_uri;
}
